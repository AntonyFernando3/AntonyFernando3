name: Generate Datas

on:
  schedule: # Roda a cada 12 horas automaticamente
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite rodar manualmente com um clique

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Passo essencial: Dá acesso ao robô para mexer no seu repositório
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Gera o gráfico do Pacman (Snake) na versão mais recente
      - name: Generate Pacman Game
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: AntonyFernando3
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Envia as imagens geradas para a branch pacman-output
      - name: Deploy to GitHub Pages
        uses: CrazyMax/ghaction-github-pages@v3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Generate Datas

on:
  schedule: # Roda a cada 12 horas automaticamente
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite que você rode manualmente com um clique

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Gera o gráfico do Pacman (Snake)
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: AntonyFernando3
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Envia a imagem gerada para a branch pacman-output
      - name: Deploy to GitHub Pages
        uses: CrazyMax/ghaction-github-pages@v2.1.3
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

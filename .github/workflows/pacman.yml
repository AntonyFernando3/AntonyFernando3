name: Generate Datas

on:
  schedule: # Roda a cada 12 horas automaticamente
    - cron: "0 */12 * * *"
  workflow_dispatch: # Permite rodar manualmente com um clique

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Passo 1: Dá acesso ao robô para mexer no seu repositório
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Passo 2: Gera o gráfico do Pacman (Snake) na pasta "dist"
      - name: Generate Pacman Game
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: AntonyFernando3
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Passo 3: Envia a pasta dist para a branch pacman-output (Usando a Action Oficial do GitHub)
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pacman-output # A branch para onde vão os SVGs
          folder: dist # A pasta onde as imagens foram geradas
